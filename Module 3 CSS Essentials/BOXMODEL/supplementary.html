<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Product Showcase</title>
    <link rel="stylesheet" href="supplementary.css">
</head>
<body>
    <header>
        <h1>Featured Products</h1>
    </header>
    <main>
        <div class="product">
            <div class="product-image">
                <img src="https://via.placeholder.com/300x200" alt="Product Image 1">
                <span class="badge">Hot</span>
            </div>
            <h2>Product 1</h2>
            <p>High-quality product perfect for everyday use.</p>
        </div>

        <div class="product">
            <div class="product-image">
                <img src="https://via.placeholder.com/300x200" alt="Product Image 2">
                <span class="badge">Sale</span>
            </div>
            <h2>Product 2</h2>
            <p>Stylish design and durable material for long-lasting use.</p>
        </div>

        <table class="product-specs">
            <tr><th>Feature</th><th>Details</th></tr>
            <tr><td>Weight</td><td>2kg</td></tr>
            <tr><td>Color</td><td>Blue</td></tr>
            <tr><td>Material</td><td>Metal</td></tr>
        </table>

        <div class="contact-form">
            <form>
                <fieldset>
                    <legend>Get in Touch</legend>
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email">
                    <button type="submit">Send Message</button>
                </fieldset>
            </form>
        </div>
    </main>
    <footer>
        <p>© 2026 My Online Store</p>
    </footer>
</body>
</html>
